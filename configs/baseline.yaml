# Baseline Configuration — Qwen2.5-VL 7B (reproducing paper results)

# ───────────────────────────────────────────────
# EXPERIMENT METADATA
# ───────────────────────────────────────────────
experiment:
  name: "baseline_qwen25vl_7b"
  description: "Reproduce UDVideoQA paper baseline - Qwen2.5-VL 7B with LoRA"
  tags: ["baseline", "qwen2.5-vl", "lora"]

# ───────────────────────────────────────────────
# MODEL
# ───────────────────────────────────────────────
model:
  name: "Qwen/Qwen2.5-VL-7B-Instruct"
  dtype: "bfloat16"           # Use bfloat16 for A100; float16 for others
  use_flash_attention: true   # Requires flash-attn installed
  use_4bit: false             # Set true for QLoRA (24GB GPU)

# ───────────────────────────────────────────────
# LORA CONFIG (Parameter-Efficient Fine-tuning)
# ───────────────────────────────────────────────
lora:
  r: 16                       # LoRA rank
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:             # Modules to apply LoRA to
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# ───────────────────────────────────────────────
# DATASET
# ───────────────────────────────────────────────
dataset:
  hf_repo: "UDVideoQA/UDVideoQA"    # HuggingFace repo
  local_path: "data/processed/"
  video_dir: "data/videos/"
  max_frames: 16               # Frames to sample per 10s clip
  frame_sampling: "uniform"    # uniform | event_guided (later)
  max_pixels: 602112           # Qwen2.5-VL default
  min_pixels: 50176

# ───────────────────────────────────────────────
# TRAINING
# ───────────────────────────────────────────────
training:
  output_dir: "results/checkpoints/baseline"
  num_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8   # Effective batch = 8
  learning_rate: 1.0e-4
  lr_scheduler: "cosine"
  warmup_ratio: 0.05
  max_grad_norm: 1.0
  save_steps: 500
  eval_steps: 500
  logging_steps: 50
  fp16: false
  bf16: true
  gradient_checkpointing: true     # VRAM saver
  dataloader_num_workers: 4
  remove_unused_columns: false

# ───────────────────────────────────────────────
# EVALUATION
# ───────────────────────────────────────────────
evaluation:
  batch_size: 4
  conditions:                  # Time-of-day splits
    - "morning"
    - "midday"
    - "evening"
    - "nighttime"
  reasoning_types:             # QA taxonomy categories
    - "BU"                     # Basic Understanding (weight 1.0)
    - "Atr"                    # Attribution (weight 1.2)
    - "ER"                     # Event Reasoning (weight 1.3)
    - "RR"                     # Reverse Reasoning (weight 1.3)
    - "CI"                     # Counterfactual Inference (weight 1.5)
  weights:
    BU: 1.0
    Atr: 1.2
    ER: 1.3
    RR: 1.3
    CI: 1.5
  llm_judge: "gemini-2.5-pro"  # LLM Judge (matches paper)

# ───────────────────────────────────────────────
# LOGGING
# ───────────────────────────────────────────────
logging:
  use_wandb: true
  wandb_project: "UDVideoQA-Capstone"
  wandb_entity: null           # Your W&B username
  log_dir: "results/logs/"

# ───────────────────────────────────────────────
# HARDWARE
# ───────────────────────────────────────────────
hardware:
  gpu_count: 1                 # Adjust to available GPUs
  seed: 42
